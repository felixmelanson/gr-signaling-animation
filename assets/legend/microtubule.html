<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;}
body{background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;}
canvas{display:block;}
p{font:13px system-ui,sans-serif;color:#152030;margin-top:10px;text-align:center;}
</style>
</head>
<body>
<canvas id="c" width="200" height="200"></canvas>
<p>α/β-tubulin (microtubule)</p>
<script>
'use strict';
const cv=document.getElementById('c'),g=cv.getContext('2d');
const W=200,H=200,cx=100,cy=100;
const C={gr:"#1a5bcc",grL:"#6ea0f8",hsp:"#b85808",hspL:"#f0a840",f51:"#b01818",f51L:"#ee8080",f52:"#0e7838",f52L:"#4ece7e",dyn:"#6814aa",dynL:"#be82f0",pred:"#b88000",predL:"#f5d84a",imp:"#607080",impL:"#a8bece",nfkb:"#aa1010",nfkbL:"#f07070",ap1:"#a85008",ap1L:"#f0a050"};
function sph(x,y,r,col,colL,op){
  if(op===undefined)op=1;
  g.save();g.globalAlpha=op;
  const gr=g.createRadialGradient(x-r*.32,y-r*.34,r*.02,x+r*.08,y+r*.08,r*1.04);
  gr.addColorStop(0,colL);gr.addColorStop(1,col);
  g.fillStyle=gr;g.beginPath();g.arc(x,y,r,0,Math.PI*2);g.fill();
  g.fillStyle='rgba(255,255,255,0.18)';g.beginPath();g.arc(x-r*.26,y-r*.3,r*.38,0,Math.PI*2);g.fill();
  g.restore();
}

const startX=20,endX=180,y1=cy-12,y2=cy+12;
let alt=true;
for(let x=startX;x<endX;x+=22){
  for(const dy of[y1,y2]){
    const c1=alt?"#7898c8":"#9ab8d0",c2=alt?"#3a5888":"#5878a0";
    const gr=g.createRadialGradient(x+8,dy-3,1,x+11,dy,10);
    gr.addColorStop(0,c1);gr.addColorStop(1,c2);
    g.fillStyle=gr;g.beginPath();g.ellipse(x+11,dy,11,7.5,0,0,Math.PI*2);g.fill();
    g.strokeStyle="rgba(255,255,255,0.22)";g.lineWidth=0.5;
    g.beginPath();g.ellipse(x+11,dy,11,7.5,0,0,Math.PI*2);g.stroke();
  }
  alt=!alt;
}

</script>
</body>
</html>
