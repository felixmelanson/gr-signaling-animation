<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;}
body{background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;}
canvas{display:block;}
p{font:13px system-ui,sans-serif;color:#152030;margin-top:10px;text-align:center;}
</style>
</head>
<body>
<canvas id="c" width="200" height="200"></canvas>
<p>Full legend panel</p>
<script>
'use strict';
const cv=document.getElementById('c'),g=cv.getContext('2d');
const W=200,H=200,cx=100,cy=100;
const C={gr:"#1a5bcc",grL:"#6ea0f8",hsp:"#b85808",hspL:"#f0a840",f51:"#b01818",f51L:"#ee8080",f52:"#0e7838",f52L:"#4ece7e",dyn:"#6814aa",dynL:"#be82f0",pred:"#b88000",predL:"#f5d84a",imp:"#607080",impL:"#a8bece",nfkb:"#aa1010",nfkbL:"#f07070",ap1:"#a85008",ap1L:"#f0a050"};
function sph(x,y,r,col,colL,op){
  if(op===undefined)op=1;
  g.save();g.globalAlpha=op;
  const gr=g.createRadialGradient(x-r*.32,y-r*.34,r*.02,x+r*.08,y+r*.08,r*1.04);
  gr.addColorStop(0,colL);gr.addColorStop(1,col);
  g.fillStyle=gr;g.beginPath();g.arc(x,y,r,0,Math.PI*2);g.fill();
  g.fillStyle='rgba(255,255,255,0.18)';g.beginPath();g.arc(x-r*.26,y-r*.3,r*.38,0,Math.PI*2);g.fill();
  g.restore();
}

function dot(x,y,r,c,cL,txt){
  const gr=g.createRadialGradient(x-r*.3,y-r*.32,1,x,y,r);
  gr.addColorStop(0,cL);gr.addColorStop(1,c);
  g.fillStyle=gr;g.beginPath();g.arc(x,y,r,0,Math.PI*2);g.fill();
  g.fillStyle="rgba(255,255,255,0.18)";g.beginPath();g.arc(x-r*.24,y-r*.3,r*.35,0,Math.PI*2);g.fill();
  if(txt){g.font="bold 8px system-ui";g.fillStyle="rgba(255,255,255,0.9)";g.textAlign="center";g.fillText(txt,x,y+3);g.textAlign="left";}
}
const items=[
  {l:"Glucocorticoid receptor",draw:(x,y)=>dot(x,y,10,C.gr,C.grL,"GR")},
  {l:"HSP90 (chaperone dimer)",draw:(x,y)=>{g.strokeStyle=C.hsp;g.lineWidth=5;g.lineCap="round";[-1,1].forEach(s=>{g.beginPath();g.moveTo(x,y-8);g.bezierCurveTo(x+s*12,y-9,x+s*18,y-4,x+s*17,y);g.bezierCurveTo(x+s*18,y+4,x+s*12,y+9,x,y+8);g.stroke();});dot(x,y-8,4,C.hsp,C.hspL,"");dot(x,y+8,4,C.hsp,C.hspL,"");}},
  {l:"FKBP51 ; inhibitory",draw:(x,y)=>dot(x,y,10,C.f51,C.f51L,"51")},
  {l:"FKBP52 ; activating",draw:(x,y)=>dot(x,y,10,C.f52,C.f52L,"52")},
  {l:"Dynein/dynactin",draw:(x,y)=>{g.strokeStyle=C.dyn;g.lineWidth=2;g.lineCap="round";g.beginPath();g.moveTo(x,y-4);g.lineTo(x-8,y+8);g.stroke();g.beginPath();g.moveTo(x,y-4);g.lineTo(x+8,y+8);g.stroke();dot(x-8,y+10,7,C.dyn,C.dynL,"");dot(x+8,y+10,7,C.dyn,C.dynL,"");}},
  {l:"Importin α/β",draw:(x,y)=>dot(x,y,10,C.imp,C.impL,"iα")},
  {l:"Prednisolone",draw:(x,y)=>{const gr=g.createRadialGradient(x-3,y-3,1,x,y,10);gr.addColorStop(0,C.predL);gr.addColorStop(1,C.pred);g.fillStyle=gr;g.beginPath();for(let i=0;i<6;i++){const a=(Math.PI/3)*i-Math.PI/6;if(i===0)g.moveTo(x+10*Math.cos(a),y+10*Math.sin(a));else g.lineTo(x+10*Math.cos(a),y+10*Math.sin(a));}g.closePath();g.fill();}},
  {l:"α/β-tubulin microtubule",draw:(x,y)=>{[-7,7].forEach((dx,i)=>{const c1=i===0?"#9ab8d0":"#b2ccec",c2=i===0?"#3a5888":"#5878a0";const gr=g.createRadialGradient(x+dx-2,y-2,.5,x+dx,y,7);gr.addColorStop(0,c1);gr.addColorStop(1,c2);g.fillStyle=gr;g.beginPath();g.ellipse(x+dx,y,7,5,0,0,Math.PI*2);g.fill();});}},
  {l:"NF-κB (p65/p50)",draw:(x,y)=>dot(x,y,10,C.nfkb,C.nfkbL,"p65")},
  {l:"AP-1 (c-Fos/c-Jun)",draw:(x,y)=>dot(x,y,10,C.ap1,C.ap1L,"AP1")},
];
const ROW=18,LX=14,panW=172,panH=items.length*ROW+12,panY=4;
g.fillStyle="rgba(255,255,255,0.9)";g.strokeStyle="rgba(70,110,190,0.38)";g.lineWidth=1;
g.beginPath();if(g.roundRect)g.roundRect(LX-4,panY,panW,panH,6);else g.rect(LX-4,panY,panW,panH);
g.fill();g.stroke();
items.forEach((item,i)=>{
  const iy=panY+i*ROW+ROW/2+4,ix=LX+14;
  item.draw(ix,iy);
  g.font="11px system-ui,sans-serif";g.fillStyle="#152030";g.textAlign="left";
  g.fillText(item.l,LX+30,iy+4);
});

</script>
</body>
</html>
