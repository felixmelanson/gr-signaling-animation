<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;}
body{background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;}
canvas{display:block;}
p{font:13px system-ui,sans-serif;color:#152030;margin-top:10px;text-align:center;}
</style>
</head>
<body>
<canvas id="c" width="200" height="200"></canvas>
<p>HSP90 ; chaperone dimer</p>
<script>
'use strict';
const cv=document.getElementById('c'),g=cv.getContext('2d');
const W=200,H=200,cx=100,cy=100;
const C={gr:"#1a5bcc",grL:"#6ea0f8",hsp:"#b85808",hspL:"#f0a840",f51:"#b01818",f51L:"#ee8080",f52:"#0e7838",f52L:"#4ece7e",dyn:"#6814aa",dynL:"#be82f0",pred:"#b88000",predL:"#f5d84a",imp:"#607080",impL:"#a8bece",nfkb:"#aa1010",nfkbL:"#f07070",ap1:"#a85008",ap1L:"#f0a050"};
function sph(x,y,r,col,colL,op){
  if(op===undefined)op=1;
  g.save();g.globalAlpha=op;
  const gr=g.createRadialGradient(x-r*.32,y-r*.34,r*.02,x+r*.08,y+r*.08,r*1.04);
  gr.addColorStop(0,colL);gr.addColorStop(1,col);
  g.fillStyle=gr;g.beginPath();g.arc(x,y,r,0,Math.PI*2);g.fill();
  g.fillStyle='rgba(255,255,255,0.18)';g.beginPath();g.arc(x-r*.26,y-r*.3,r*.38,0,Math.PI*2);g.fill();
  g.restore();
}

function hsp90Monomer(cx,cy,r,side){
  const or=r+15,ow=or*1.26;
  const j1x=cx,j1y=cy-or*.85,j2x=cx,j2y=cy+or*.85;
  const c1x=cx+side*ow*.5,c1y=cy-or*.92,c2x=cx+side*ow*.88,c2y=cy-or*.38;
  const mx=cx+side*ow*.86,my=cy;
  const c3x=cx+side*ow*.88,c3y=cy+or*.38,c4x=cx+side*ow*.5,c4y=cy+or*.92;
  g.strokeStyle=C.hsp;g.lineWidth=10;g.lineCap="round";
  g.beginPath();g.moveTo(j1x,j1y);g.bezierCurveTo(c1x,c1y,c2x,c2y,mx,my);g.bezierCurveTo(c3x,c3y,c4x,c4y,j2x,j2y);g.stroke();
  g.strokeStyle=C.hspL;g.lineWidth=4;
  g.beginPath();g.moveTo(j1x,j1y);g.bezierCurveTo(c1x*.88+cx*.12,c1y*.88+cy*.12,c2x*.88+cx*.12,c2y*.88+cy*.12,mx,my);g.bezierCurveTo(c3x*.88+cx*.12,c3y*.88+cy*.12,c4x*.88+cx*.12,c4y*.88+cy*.12,j2x,j2y);g.stroke();
  sph(mx,my,7,C.hsp,C.hspL);
}
const r=18,or=r+15;
hsp90Monomer(cx,cy,r,-1);
hsp90Monomer(cx,cy,r,1);
sph(cx,cy-or*.85,9,C.hsp,C.hspL);
sph(cx,cy+or*.85,9,C.hsp,C.hspL);

</script>
</body>
</html>
